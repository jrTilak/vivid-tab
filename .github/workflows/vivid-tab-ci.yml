name: Vivid Tab CI

on:
  pull_request:
    paths:
      - ".github/workflows/vivid-tab-ci.yml"
      - "apps/vivid-tab/**"
      - "biome.json"
      - "bun.lock"
      - "CHANGELOG.md"
      - "package.json"
      - "PRIVACY.md"
      - "TERMS.md"
      - "WHATS_NEW.md"
  push:
    paths:
      - ".github/workflows/vivid-tab-ci.yml"
      - "apps/vivid-tab/**"
      - "biome.json"
      - "bun.lock"
      - "CHANGELOG.md"
      - "package.json"
      - "PRIVACY.md"
      - "TERMS.md"
      - "WHATS_NEW.md"
  workflow_dispatch:

concurrency:
  group: vivid-tab-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify extension
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Vivid Tab formatting and lint
        run: bunx --bun --no-install biome check apps/vivid-tab

      - name: Type-check Vivid Tab
        run: bunx --bun --no-install tsc --noEmit --project apps/vivid-tab/tsconfig.json

      - name: Type-check browser E2E suites
        run: bun run --cwd apps/vivid-tab test:e2e:types

      - name: Run unit coverage
        run: bun run --cwd apps/vivid-tab test:coverage -- --runInBand

      - name: Check dead code and dependencies
        run: bun run --cwd apps/vivid-tab check:dead-code

  package:
    name: Validate release archives
    if: github.event_name == 'workflow_dispatch'
    needs:
      - verify
      - browser-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package and validate both browsers
        run: bun run --cwd apps/vivid-tab release

      - name: Upload validated store archives
        uses: actions/upload-artifact@v4
        with:
          name: vivid-tab-${{ github.sha }}
          path: |
            apps/vivid-tab/build/chrome-mv3-prod.zip
            apps/vivid-tab/build/firefox-mv3-prod.zip
          if-no-files-found: error

  browser-e2e:
    name: ${{ matrix.name }} E2E
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            name: Chromium
            script: test:e2e:c
          - browser: firefox
            name: Firefox
            script: test:e2e:ff
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.name }} browser journeys
        run: bun run --cwd apps/vivid-tab ${{ matrix.script }}

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vivid-tab-${{ matrix.browser }}-${{ github.sha }}
          path: apps/vivid-tab/.e2e/screenshots
          if-no-files-found: ignore
